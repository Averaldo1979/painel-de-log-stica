
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Cargo Transportation - Torre de Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            scrollbar-width: thin;
            scrollbar-color: #334155 #020617;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .airport-font {
            font-family: 'JetBrains+Mono', monospace;
            letter-spacing: -0.02em;
        }
        @keyframes progress-anim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0%); }
        }
        .animate-progress {
            animation: progress-anim 2.5s ease-out forwards;
        }
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.95; }
            10% { opacity: 0.9; }
            15% { opacity: 0.95; }
            20% { opacity: 0.98; }
            25% { opacity: 0.95; }
            100% { opacity: 1; }
        }
        .row-atrasado-blink {
            animation: pulse-red-row 1s infinite ease-in-out, flicker 0.1s infinite;
        }
        @keyframes pulse-red-row {
            0%, 100% { background-color: rgba(239, 68, 68, 0.1); }
            50% { background-color: rgba(239, 68, 68, 0.02); }
        }
        @keyframes pulse-yellow-row {
            0%, 100% { background-color: rgba(234, 179, 8, 0.1); }
            50% { background-color: rgba(234, 179, 8, 0.01); }
        }
        .row-carregando-blink {
            animation: pulse-yellow-row 1.5s infinite ease-in-out;
        }
        .glow-text {
            text-shadow: 0 0 15px currentColor;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
            border: 2px solid #020617;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
<script type="importmap">
{

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
